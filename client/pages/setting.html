<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings – Rudraksha</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="../shared.css">
<style>
.setting-item { display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid var(--border); font-size:14px; }
.switch { position:relative; display:inline-block; width:44px; height:22px; }
.switch input { opacity:0; width:0; height:0; }
.slider { position:absolute; cursor:pointer; inset:0; background:#ccc; transition:.3s; border-radius:30px; }
.slider:before { position:absolute; content:""; height:16px; width:16px; left:3px; bottom:3px; background:#fff; transition:.3s; border-radius:50%; }
input:checked + .slider { background:var(--primary); }
input:checked + .slider:before { transform:translateX(22px); }
</style>
</head>
<body>

<nav class="topnav">
  <span class="logo-text">RC Rudraksha</span>
  <div class="topnav-right">
    <button class="dark-toggle">🌙</button>
    <button class="hamburger" id="hamburger" aria-label="Open menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<div class="app-shell">
  <aside class="sidebar">
    <div class="logo">RC Rudraksha</div>
    <div class="menu">
      <a href="dashboard.html"><i class="fa fa-chart-line"></i>Dashboard</a>
      <a href="students.html"><i class="fa fa-user-graduate"></i>Students</a>
      <a href="courses.html"><i class="fa fa-book"></i>Courses</a>
      <a href="packages.html"><i class="fa fa-box"></i>Packages</a>
      <a href="attendance.html"><i class="fa fa-calendar-check"></i>Attendance</a>
      <a href="report.html"><i class="fa-solid fa-chart-pie"></i>Reports</a>
      <a href="setting.html" class="active"><i class="fa fa-gear"></i>Settings</a>
    </div>
    <div class="admin-box"><strong>Admin User</strong><br>admin@rudraksha.com</div>
  </aside>

  <main class="main">
    <div class="page-header">
      <div><h2>Settings</h2><p>Manage your institute settings and preferences</p></div>
      <button class="dark-toggle">🌙</button>
    </div>

    <div class="card">
      <h3><i class="fa fa-building" style="margin-right:8px;color:var(--primary)"></i>Institute Information</h3>
      <div class="form-group"><label>Institute Name</label><input type="text" id="instituteName" placeholder="Enter institute name"></div>
      <div class="form-group"><label>Email</label><input type="email" id="instituteEmail" placeholder="Enter email"></div>
      <div class="form-group"><label>Phone</label><input type="tel" id="institutePhone" placeholder="Enter phone number"></div>
      <div class="form-group"><label>Address</label><textarea id="instituteAddress" rows="3" placeholder="Enter address" style="width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:14px;outline:none;resize:vertical;"></textarea></div>
      <button class="btn btn-primary" onclick="saveSettings()"><i class="fa fa-save"></i> Save Changes</button>
    </div>

    <div class="card">
      <h3><i class="fa fa-bell" style="margin-right:8px;color:var(--primary)"></i>Notifications</h3>
      <div class="setting-item"><span>Email Notifications</span><label class="switch"><input type="checkbox" id="emailNotifications"><span class="slider"></span></label></div>
      <div class="setting-item"><span>SMS Alerts</span><label class="switch"><input type="checkbox" id="smsAlerts"><span class="slider"></span></label></div>
      <div class="setting-item"><span>Attendance Alerts</span><label class="switch"><input type="checkbox" id="attendanceAlerts"><span class="slider"></span></label></div>
    </div>
  </main>
</div>

<script src="/api.js"></script>
<script src="../shared.js"></script>

<script>

if(!localStorage.getItem("token")){
  window.location.href="login.html";
}

document.addEventListener("DOMContentLoaded", loadSettings);

async function loadSettings(){
  const result = await API.settings.get();
  if(result.success && result.settings){
    const settings = result.settings;
    document.getElementById("instituteName").value = settings.instituteName || "";
    document.getElementById("instituteEmail").value = settings.email || "";
    document.getElementById("institutePhone").value = settings.phone || "";
    document.getElementById("instituteAddress").value = settings.address || "";
    document.getElementById("emailNotifications").checked = settings.notifications?.email ?? true;
    document.getElementById("smsAlerts").checked = settings.notifications?.sms ?? false;
    document.getElementById("attendanceAlerts").checked = settings.notifications?.attendance ?? false;
  }
}

async function saveSettings(){
  const settingsData = {
    instituteName: document.getElementById("instituteName").value,
    email: document.getElementById("instituteEmail").value,
    phone: document.getElementById("institutePhone").value,
    address: document.getElementById("instituteAddress").value,
    notifications: {
      email: document.getElementById("emailNotifications").checked,
      sms: document.getElementById("smsAlerts").checked,
      attendance: document.getElementById("attendanceAlerts").checked
    }
  };
  
  const result = await API.settings.update(settingsData);
  
  if(result.success){
    alert("Settings saved successfully");
  } else {
    alert("Error saving settings: " + result.message);
  }
}

</script>

</html>
```
