<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
display:flex;
background:#f5f7fb;
}

/* Sidebar */

.sidebar{
width:230px;
background:white;
height:100vh;
padding:25px;
box-shadow:2px 0 10px rgba(0,0,0,0.05);
}

.logo{
font-size:20px;
font-weight:600;
margin-bottom:30px;
color:#ff7a00;
}

.menu a{
display:flex;
align-items:center;
gap:10px;
padding:12px;
margin-bottom:10px;
text-decoration:none;
color:#333;
border-radius:8px;
transition:0.3s;
}

.menu a:hover{
background:#fff3e6;
color:#ff7a00;
}

.menu a.active{
background:#ff7a00;
color:white;
}

/* Main */

.main{
flex:1;
padding:30px;
}

/* Header */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.profile{
display:flex;
align-items:center;
gap:10px;
}

.profile img{
width:40px;
border-radius:50%;
}

/* Cards */

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.card h4{
color:#777;
margin-bottom:8px;
}

.card h2{
font-size:24px;
}

/* Layout */

.grid{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
}

/* Courses */

.courses{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.course{
padding:15px 0;
border-bottom:1px solid #eee;
}

.progress-bar{
background:#eee;
height:8px;
border-radius:10px;
margin-top:6px;
}

.progress{
height:8px;
background:#ff7a00;
border-radius:10px;
}

/* Announcements */

.announcements{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.notice{
padding:12px 0;
border-bottom:1px solid #eee;
font-size:14px;
}

/* Chart */

.chart-box{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
margin-top:20px;
}

</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<div class="logo">RC Rudraksha</div>

<div class="menu">

<a href="stud_dashboard.html" class="active"><i class="fa fa-chart-line"></i> Dashboard</a>

<a href="stud_my_courses.html"><i class="fa fa-book"></i> My Courses</a>

<a href="stud_attendance.html"><i class="fa fa-calendar-check"></i> Attendance</a>

<a href="stud_progres.html"><i class="fa fa-chart-bar"></i> Progress</a>

<a href="stud_assignment.html"><i class="fa fa-file"></i> Assignments</a>

<a href="#"><i class="fa fa-user"></i> Profile</a>

<a href="#"><i class="fa fa-sign-out"></i> Logout</a>

</div>

</div>

<!-- Main -->

<div class="main">

<!-- Header -->

<div class="header">

<div>
<h2 id="welcomeHeading">Welcome back, Student 👋</h2>
<p>Track your learning progress</p>
</div>

<div class="profile">
<img src="https://i.pravatar.cc/40">
</div>

</div>

<!-- Cards -->

<div class="cards">

<div class="card">
<h4>Enrolled Courses</h4>
<h2 id="coursesCount">0</h2>
</div>

<div class="card">
<h4>Attendance</h4>
<h2 id="attendanceValue">0%</h2>
</div>

<div class="card">
<h4>Assignments</h4>
<h2 id="assignmentsValue">0</h2>
</div>

<div class="card">
<h4>Completed</h4>
<h2 id="completedValue">0</h2>
</div>

</div>

<!-- Grid Layout -->

<div class="grid">

<!-- Courses -->

<div class="courses">

<h3>My Courses</h3>
<div id="coursesContainer"></div>

</div>

<!-- Announcements -->

<div class="announcements">

<h3>Announcements</h3>
<div id="announcementsContainer"></div>

</div>

</div>

<!-- Chart -->

<div class="chart-box">

<h3>Learning Progress</h3>

<canvas id="progressChart"></canvas>

</div>

</div>

<script>
const token = localStorage.getItem("token");
const welcomeHeading = document.getElementById("welcomeHeading");
const coursesCount = document.getElementById("coursesCount");
const attendanceValue = document.getElementById("attendanceValue");
const assignmentsValue = document.getElementById("assignmentsValue");
const completedValue = document.getElementById("completedValue");
const coursesContainer = document.getElementById("coursesContainer");
const announcementsContainer = document.getElementById("announcementsContainer");
const progressCanvas = document.getElementById("progressChart");

const renderDashboard = (data) => {
  const courses = data.courses || data.enrolledCourses || [];
  console.log("[RENDER] Full data:", JSON.stringify(data, null, 2));
  console.log("[RENDER] Name:", data.name);
  console.log("[RENDER] Courses:", courses);
  console.log("[RENDER] Courses count:", courses.length);
  
  document.querySelector("h2").innerText = "Welcome back, " + (data.name || "Student");
  
  const cards = document.querySelectorAll(".card h2");
  cards[0].innerText = data.totalCourses || 0;
  cards[1].innerText = (data.attendance || 0) + "%";
  cards[2].innerText = data.assignments || 0;
  cards[3].innerText = data.completed || 0;

  coursesContainer.innerHTML = "<h3>My Courses</h3>";
  
  console.log("[RENDER] Checking courses array...");
  console.log("[RENDER] Is array?", Array.isArray(courses));
  
  if (!courses || courses.length === 0) {
    console.log("[RENDER] No courses to render");
    coursesContainer.innerHTML += "<p style='color:#999;'>No courses enrolled yet</p>";
  } else {
    console.log("[RENDER] Starting to render " + courses.length + " courses");
    courses.forEach((course, idx) => {
      console.log("[RENDER] Rendering course " + idx, course);
      
      // Normalize course data structure
      const courseId = course.courseId || course._id || "";
      const name = course.name || course.courseName || "Unknown Course";
      const fees = course.feesPaid || course.fees || 0;
      const endDateRaw = course.expectedEndDate || course.endDate || null;
      const endDate = endDateRaw 
        ? new Date(endDateRaw).toLocaleDateString() 
        : "Not Available";
      
      // Load saved progress from localStorage, fallback to backend progress
      const savedProgress = courseId ? localStorage.getItem("progress_" + courseId) : null;
      const progress = savedProgress !== null 
        ? Math.min(Number(savedProgress), 100)
        : Math.min(Number(course.progress) || 0, 100);
      
      console.log({
        courseId,
        name,
        endDate,
        fees,
        progress
      });
      
      console.log("[RENDER] Adding course: " + name + " (progress: " + progress + "%)");
      coursesContainer.innerHTML += `
        <div class="course">
          <strong>${name}</strong>
          <div style="font-size:12px;color:#666;margin-top:4px;">
            Fees: Rs${fees} | End: ${endDate}
          </div>
          <div class="progress-bar" style="margin-top:8px;">
            <div class="progress" style="width:${progress}%"></div>
          </div>
          <div style="font-size:11px;color:#999;margin-top:4px;">${progress}% Complete</div>
          <button class="btn" style="margin-top:8px;padding:6px 12px;font-size:12px;" onclick="continueLearning('${courseId.replace(/'/g, "\\'")}')">
            Continue Learning
          </button>
        </div>
      `;
    });
  }

  announcementsContainer.innerHTML = "";
  var announcements = ["Class tomorrow at 2 PM", "Assignment due Friday", "New resources uploaded"];
  announcements.forEach((notice) => {
    const noticeEl = document.createElement("div");
    noticeEl.className = "notice";
    noticeEl.textContent = notice;
    announcementsContainer.appendChild(noticeEl);
  });

  if (courses && courses.length > 0) {
    const labels = courses.map((c) => c.courseName || c.name || "Course");
    const values = courses.map((c) => {
      const courseId = c._id || c.courseId || "";
      const savedProgress = courseId ? localStorage.getItem("progress_" + courseId) : null;
      return savedProgress !== null 
        ? Math.min(Number(savedProgress), 100)
        : Math.min(Number(c.progress) || 0, 100);
    });
    console.log("[RENDER] Chart labels:", labels);
    console.log("[RENDER] Chart values:", values);
    new Chart(progressCanvas, {
      type: "line",
      data: {
        labels: labels,
        datasets: [{
          label: "Progress",
          data: values,
          borderColor: "#ff7a00",
          backgroundColor: "rgba(255,122,0,0.2)",
          fill: true,
          tension: 0.4
        }]
      },
      options: {
        responsive: true,
        scales: {
          y: { beginAtZero: true, max: 100 }
        }
      }
    });
  }
};

const loadDashboard = async () => {
  if (!token) {
    window.location.href = "stud_login.html";
    return;
  }

  try {
    console.log("[LOAD] Token found:", token.substring(0, 20) + "...");
    console.log("[LOAD] Fetching dashboard...");
    
    const response = await fetch("http://localhost:5000/api/student/dashboard", {
      method: "GET",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      }
    });

    console.log("[LOAD] Response status:", response.status);
    console.log("[LOAD] Response headers:", response.headers);

    if (!response.ok) {
      const errorData = await response.json().catch(() => ({}));
      throw new Error(errorData.message || `Server error: ${response.status}`);
    }

    const data = await response.json();
    console.log("[LOAD] Full response data:", JSON.stringify(data, null, 2));
    console.log("[LOAD] Data.courses:", data.courses);
    console.log("[LOAD] Data.courses is array?", Array.isArray(data.courses));

    renderDashboard(data);
  } catch (error) {
    console.error("[LOAD] Error:", error);
    alert("Unable to load dashboard. Please login again.");
    localStorage.removeItem("token");
    window.location.href = "stud_login.html";
  }
};

// Listen for progress updates from other pages and refresh
window.addEventListener("progressUpdated", () => {
  console.log("[SYNC] Progress updated in another page, reloading...");
  location.reload();
});

function continueLearning(courseId) {
  console.log("SELECTED COURSE ID:", courseId);

  // store selected course
  localStorage.setItem("selectedCourseId", courseId);

  // redirect
  window.location.href = "stud_continue_learning.html";
}

loadDashboard();
</script>

</body>
</html>
