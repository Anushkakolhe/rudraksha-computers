<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#2563eb,#4f7df3);
}

/* Container */

.container{
width:850px;
background:white;
border-radius:12px;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
display:flex;
overflow:hidden;
}

/* Left Side */

.left{
width:50%;
background:linear-gradient(135deg,#2563eb,#4f7df3);
color:white;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:40px;
text-align:center;
}

.left h2{
margin-bottom:15px;
}

.left p{
font-size:14px;
}

/* Right Side */

.right{
width:50%;
padding:40px;
}

.form{
display:flex;
flex-direction:column;
}

.form h2{
margin-bottom:20px;
text-align:center;
}

.input-box{
position:relative;
margin-bottom:18px;
}

.input-box input{
width:100%;
padding:12px 40px;
border:1px solid #ddd;
border-radius:6px;
outline:none;
}

.input-box i{
position:absolute;
left:12px;
top:13px;
color:#666;
}

button{
padding:12px;
border:none;
background:#2563eb;
color:white;
border-radius:6px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#1d4ed8;
}

.toggle{
text-align:center;
margin-top:15px;
font-size:14px;
}

.toggle span{
color:#2563eb;
cursor:pointer;
font-weight:500;
}

/* Hide signup initially */

#signup{
display:none;
}

</style>

</head>

<body>

<div class="container">

<div class="left">
<h2>Welcome Student</h2>
<p>Login to access your courses, assignments, progress and dashboard.</p>
</div>

<div class="right">

     
<!-- LOGIN -->

<div id="login" class="form">

<h2>Student Login</h2>

<div class="input-box">
<i class="fa fa-envelope"></i>
<input type="email" placeholder="Email" id="login-email">
</div>

<div class="input-box">
<i class="fa fa-lock"></i>
<input type="password" placeholder="Password" id="login-password">
</div>

<button onclick="login()">Login</button>

<div class="toggle">
Don't have an account?
<span onclick="showSignup()">Sign Up</span>
</div>

</div>

<!-- SIGNUP -->

<div id="signup" class="form">

<h2>Create Account</h2>

<div class="input-box">
<i class="fa fa-user"></i>
<input type="text" placeholder="Full Name" id="signup-name">
</div>

<div class="input-box">
<i class="fa fa-envelope"></i>
<input type="email" placeholder="Email" id="signup-email">
</div>

<div class="input-box">
<i class="fa fa-phone"></i>
<input type="tel" placeholder="Phone Number" id="signup-phone">
</div>

<div class="input-box">
<i class="fa fa-lock"></i>
<input type="password" placeholder="Password" id="signup-password">
</div>

<button onclick="signup()">Create Account</button>

<div class="toggle">
Already have an account?
<span onclick="showLogin()">Login</span>
</div>

</div>

</div>

</div>

<script>

function showSignup(){
document.getElementById("login").style.display="none";
document.getElementById("signup").style.display="flex";
}

function showLogin(){
document.getElementById("signup").style.display="none";
document.getElementById("login").style.display="flex";
}

async function signup() {
  const name = document.getElementById("signup-name").value;
  const email = document.getElementById("signup-email").value;
  const phone = document.getElementById("signup-phone").value;
  const password = document.getElementById("signup-password").value;

  try {
    const response = await fetch("https://rudraksha-computers.onrender.com/api/student/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        name,
        email,
        phone,
        password
      })
    });

    const data = await response.json();

    if (data.success) {
      alert(data.message);
      showLogin();
    } else {
      alert(data.message);
    }
  } catch (error) {
    console.error("Signup error:", error);
    alert("An error occurred. Please try again.");
  }
}

async function login() {
  const email = document.getElementById("login-email").value.toLowerCase().trim();
  const password = document.getElementById("login-password").value;

  try {
    console.log("[LOGIN] Attempting login for:", email);
    const response = await fetch("https://rudraksha-computers.onrender.com/api/student/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        email,
        password
      })
    });

    console.log("[LOGIN] Response status:", response.status);

    const data = await response.json();
    console.log("[LOGIN] Response:", data);

    if (data.success && data.token) {
      console.log("[LOGIN] Login successful. Storing token and email.");
      localStorage.setItem("token", data.token);
      localStorage.setItem("email", data.email || data.student.email);
      console.log("[LOGIN] Token stored, length:", data.token.length);
      console.log("[LOGIN] Redirecting to dashboard...");
      window.location.href = "stud_dashboard.html";
    } else {
      alert(data.message);
    }
  } catch (error) {
    console.error("[LOGIN] Error:", error);
    alert("An error occurred. Please try again.");
  }
}

</script>

</body>
</html>
