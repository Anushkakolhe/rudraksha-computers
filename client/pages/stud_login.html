<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Login – Rudraksha</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="../shared.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-left">
      <h2>Welcome Student</h2>
      <p>Login to access your courses, assignments, progress and dashboard.</p>
    </div>
    <div class="login-right">
      <div id="login" class="login-form">
        <h2>Student Login</h2>
        <div class="input-box"><i class="fa fa-envelope"></i><input type="email" id="login-email" placeholder="Email"></div>
        <div class="input-box"><i class="fa fa-lock"></i><input type="password" id="login-password" placeholder="Password"></div>
        <button class="login-btn" onclick="login()">Login</button>
        <div class="toggle-link">Don't have an account? <span onclick="showSignup()">Sign Up</span></div>
      </div>
      <div id="signup" class="login-form" style="display:none;">
        <h2>Create Account</h2>
        <div class="input-box"><i class="fa fa-user"></i><input type="text" id="signup-name" placeholder="Full Name"></div>
        <div class="input-box"><i class="fa fa-envelope"></i><input type="email" id="signup-email" placeholder="Email"></div>
        <div class="input-box"><i class="fa fa-phone"></i><input type="tel" id="signup-phone" placeholder="Phone Number"></div>
        <div class="input-box"><i class="fa fa-lock"></i><input type="password" id="signup-password" placeholder="Password"></div>
        <button class="login-btn" onclick="signup()">Create Account</button>
        <div class="toggle-link">Already have an account? <span onclick="showLogin()">Login</span></div>
      </div>
    </div>
  </div>
</div>

<script src="../shared.js"></script>
<script>
function showSignup() { document.getElementById("login").style.display="none"; document.getElementById("signup").style.display="flex"; }
function showLogin()  { document.getElementById("signup").style.display="none"; document.getElementById("login").style.display="flex"; }

async function signup() {
  const name = document.getElementById("signup-name").value;
  const email = document.getElementById("signup-email").value;
  const phone = document.getElementById("signup-phone").value;
  const password = document.getElementById("signup-password").value;
  try {
    const res = await fetch("https://rudraksha-computers.onrender.com/api/student/register", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({name,email,phone,password})
    });
    const data = await res.json();
    data.success ? (showToast(data.message), showLogin()) : showToast(data.message, "error");
  } catch { showToast("An error occurred. Please try again.", "error"); }
}

async function login() {
  const email = document.getElementById("login-email").value.toLowerCase().trim();
  const password = document.getElementById("login-password").value;
  try {
    const res = await fetch("https://rudraksha-computers.onrender.com/api/student/login", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({email,password})
    });
    const data = await res.json();
    if (data.success && data.token) {
      localStorage.setItem("token", data.token);
      localStorage.setItem("email", data.email || data.student?.email);
      window.location.href = "stud_dashboard.html";
    } else { showToast(data.message, "error"); }
  } catch { showToast("An error occurred. Please try again.", "error"); }
}
</script>
</body>
</html>
