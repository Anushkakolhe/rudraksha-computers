<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Students – Rudraksha</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="../shared.css">
</head>
<body>

<nav class="topnav">
  <span class="logo-text">RC Rudraksha</span>
  <div class="topnav-right">
    <button class="dark-toggle" aria-label="Toggle dark mode">🌙</button>
    <button class="hamburger" id="hamburger" aria-label="Open menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<div class="sidebar-overlay" id="sidebar-overlay"></div>

<div class="app-shell">
  <aside class="sidebar">
    <div class="logo">RC Rudraksha</div>
    <ul class="menu">
      <li><a href="dashboard.html"><i class="fa-solid fa-chart-line"></i>Dashboard</a></li>
      <li class="active"><a href="students.html"><i class="fa-solid fa-user-graduate"></i>Students</a></li>
      <li><a href="courses.html"><i class="fa-solid fa-book"></i>Courses</a></li>
      <li><a href="packages.html"><i class="fa-solid fa-box"></i>Packages</a></li>
      <li><a href="attendance.html"><i class="fa-solid fa-calendar-check"></i>Attendance</a></li>
      <li><a href="report.html"><i class="fa-solid fa-chart-pie"></i>Reports</a></li>
      <li><a href="setting.html"><i class="fa-solid fa-gear"></i>Settings</a></li>
    </ul>
    <div class="admin-box"><strong>Admin User</strong><br>admin@rudraksha.com</div>
  </aside>

  <main class="main">
    <div class="page-header">
      <div>
        <h2>Students</h2>
        <p>Manage and view all student information</p>
      </div>
      <div class="header-actions">
        <button class="btn btn-primary" onclick="openModal()"><i class="fa-solid fa-plus"></i> Add Student</button>
        <button class="dark-toggle">🌙</button>
      </div>
    </div>

    <div class="search-bar">
      <i class="fa-solid fa-search" style="color:var(--text-muted)"></i>
      <input type="text" id="searchInput" placeholder="Search students by name, email, course…">
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Student</th>
            <th>Contact</th>
            <th>Course</th>
            <th>Enrolled</th>
            <th>End Date</th>
            <th>Total Fees</th>
            <th>Paid</th>
            <th>Remaining</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="studentTable"></tbody>
      </table>
    </div>
  </main>
</div>

<!-- Modal -->
<div class="modal" id="studentModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="modalTitle">Add Student</h3>
      <button class="modal-close" onclick="closeModal()" aria-label="Close">✕</button>
    </div>
    <div class="form-group"><label>Full Name *</label><input type="text" id="name" placeholder="Student name"></div>
    <div class="form-group"><label>Email *</label><input type="email" id="email" placeholder="Email address"></div>
    <div class="form-group"><label>Phone *</label><input type="tel" id="phone" placeholder="Phone number"></div>
    <div class="form-group"><label>Address</label><input type="text" id="address" placeholder="Address"></div>
    <div class="form-group">
      <label>Course / Package * <small style="color:var(--text-muted)">(hold Ctrl/Cmd for multiple)</small></label>
      <select id="course" multiple style="min-height:90px;"></select>
    </div>
    <div class="form-group"><label>Total Fees</label><input type="number" id="totalFees" placeholder="Auto-calculated" readonly></div>
    <div class="form-group"><label>Fees Paid *</label><input type="number" id="feesPaid" placeholder="Amount paid" min="0"></div>
    <div class="form-group"><label>Enrollment Date</label><input type="date" id="enrollmentDate"></div>
    <div class="form-group"><label>End Date</label><input type="date" id="endDate"></div>
    <button class="btn btn-primary btn-full" onclick="saveStudent()">Save Student</button>
  </div>
</div>

<script src="/api.js"></script>
<script src="../shared.js"></script>
<script>
if (!localStorage.getItem("token")) window.location.href = "login.html";

document.addEventListener("DOMContentLoaded", () => {
  loadCourses();
  loadStudents();
  document.getElementById("course").addEventListener("change", calculateTotalFees);
  document.getElementById("searchInput").addEventListener("input", e => {
    const q = e.target.value.toLowerCase();
    document.querySelectorAll("#studentTable tr").forEach(row => {
      row.style.display = row.textContent.toLowerCase().includes(q) ? "" : "none";
    });
  });
});

async function loadCourses() {
  const [cr, pr] = await Promise.all([API.courses.getAll(), API.packages.getAll()]);
  const sel = document.getElementById("course");
  sel.innerHTML = "";
  (cr.courses || []).forEach(c => {
    const o = new Option(`Course: ${c.courseName}`, "course_" + c._id);
    o.dataset.fee = c.fees || 0; sel.appendChild(o);
  });
  (pr.packages || []).forEach(p => {
    const o = new Option(`Package: ${p.packageName}`, "package_" + p._id);
    o.dataset.fee = p.finalPrice || p.totalPrice || 0; sel.appendChild(o);
  });
}

function calculateTotalFees() {
  const total = Array.from(document.getElementById("course").selectedOptions)
    .reduce((sum, o) => sum + (parseFloat(o.dataset.fee) || 0), 0);
  document.getElementById("totalFees").value = total || "";
}

async function loadStudents() {
  showSpinner();
  const result = await API.ownerStudents.getAll();
  hideSpinner();
  if (result.success && result.students) displayStudents(result.students);
}

function displayStudents(students) {
  const tbody = document.getElementById("studentTable");
  tbody.innerHTML = "";
  students.forEach(s => {
    const initials = s.name.split(" ").map(n => n[0]).join("").toUpperCase();
    const enrolled = new Date(s.enrollmentDate).toLocaleDateString();
    const end = s.endDate ? new Date(s.endDate).toLocaleDateString() : "N/A";
    let courses = "N/A";
    if (s.courses?.length) courses = s.courses.map(c => c.courseName || c.name || "Course").join(", ");
    else if (s.package?.packageName) courses = s.package.packageName;
    else if (s.course?.courseName) courses = s.course.courseName;

    tbody.innerHTML += `
    <tr>
      <td><div class="student-cell"><div class="avatar">${initials}</div>${s.name}</div></td>
      <td style="font-size:13px;">${s.email}<br>${s.phone}</td>
      <td style="max-width:160px;font-size:13px;">${courses}</td>
      <td>${enrolled}</td>
      <td>${end}</td>
      <td>₹${(s.totalFees||0).toLocaleString()}</td>
      <td>₹${(s.feesPaid||0).toLocaleString()}</td>
      <td>₹${((s.totalFees||0)-(s.feesPaid||0)).toLocaleString()}</td>
      <td style="white-space:nowrap;">
        <button class="action-btn" title="Pay Fees" onclick="payFees('${s._id}','${s.name.replace(/'/g,"\\'")}')">
          <i class="fa-solid fa-credit-card" style="color:var(--green)"></i></button>
        <button class="action-btn edit" title="Edit" onclick="editStudent('${s._id}')">
          <i class="fa-solid fa-pen"></i></button>
        <button class="action-btn delete" title="Delete" onclick="deleteStudent('${s._id}')">
          <i class="fa-solid fa-trash"></i></button>
      </td>
    </tr>`;
  });
}

async function payFees(id, name) {
  const amt = prompt(`Payment amount for ${name}:`);
  if (!amt) return;
  const amount = parseFloat(amt);
  if (isNaN(amount) || amount <= 0) { showToast("Enter a valid amount", "error"); return; }
  const r = await API.ownerStudents.payFees(id, { amount });
  r.success ? (showToast("Payment recorded"), loadStudents()) : showToast(r.message, "error");
}

let editingStudentId = null;

function openModal(id = null) {
  editingStudentId = id;
  document.getElementById("modalTitle").textContent = id ? "Update Student" : "Add Student";
  if (!id) clearForm();
  else loadStudentForEdit(id);
  document.getElementById("studentModal").classList.add("open");
}

function editStudent(id) { openModal(id); }

function closeModal() {
  document.getElementById("studentModal").classList.remove("open");
  editingStudentId = null;
}

function clearForm() {
  ["name","email","phone","address","totalFees","feesPaid","enrollmentDate","endDate"].forEach(id => {
    document.getElementById(id).value = "";
  });
  document.getElementById("course").value = "";
}

async function loadStudentForEdit(id) {
  const r = await API.ownerStudents.get(id);
  if (!r.success || !r.data) return;
  const s = r.data;
  document.getElementById("name").value = s.name;
  document.getElementById("email").value = s.email;
  document.getElementById("phone").value = s.phone;
  document.getElementById("address").value = s.address || "";
  document.getElementById("feesPaid").value = s.feesPaid || 0;
  document.getElementById("enrollmentDate").value = s.enrollmentDate ? new Date(s.enrollmentDate).toISOString().split("T")[0] : "";
  document.getElementById("endDate").value = s.endDate ? new Date(s.endDate).toISOString().split("T")[0] : "";
  const sel = document.getElementById("course");
  Array.from(sel.options).forEach(o => {
    o.selected = (s.courses || []).some(c =>
      (c.courseId && o.value === "course_" + c.courseId) ||
      (c.packageId && o.value === "package_" + c.packageId)
    );
  });
  sel.dispatchEvent(new Event("change"));
}

async function saveStudent() {
  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const address = document.getElementById("address").value.trim();
  const sel = document.getElementById("course");
  const totalFees = parseFloat(document.getElementById("totalFees").value);
  const feesPaid = parseFloat(document.getElementById("feesPaid").value);
  const enrollmentDate = document.getElementById("enrollmentDate").value;
  const endDate = document.getElementById("endDate").value;

  if (!name || !email || !phone || !sel.selectedOptions.length || isNaN(totalFees) || isNaN(feesPaid)) {
    showToast("Please fill all required fields", "error"); return;
  }
  if (feesPaid > totalFees) { showToast("Fees paid cannot exceed total fees", "error"); return; }

  const courses = Array.from(sel.selectedOptions).map(o => ({
    courseName: o.text,
    courseId: o.value.startsWith("course_") ? o.value.replace("course_","") : null,
    packageId: o.value.startsWith("package_") ? o.value.replace("package_","") : null,
    feesPaid, progress: 0,
    expectedEndDate: endDate || null,
    enrolledDate: enrollmentDate || new Date().toISOString()
  }));

  const data = { name, email, phone, address, courses, totalFees, feesPaid,
    enrollmentDate: enrollmentDate || new Date().toISOString(), endDate: endDate || null };

  showSpinner();
  const r = editingStudentId
    ? await API.ownerStudents.update(editingStudentId, data)
    : await API.ownerStudents.add(data);
  hideSpinner();

  if (r.success) {
    showToast(editingStudentId ? "Student updated" : "Student added");
    closeModal(); loadStudents();
  } else {
    showToast(r.message, "error");
  }
}

async function deleteStudent(id) {
  if (!confirm("Delete this student?")) return;
  const r = await API.ownerStudents.delete(id);
  r.success ? (showToast("Student deleted"), loadStudents()) : showToast(r.message, "error");
}
</script>
</body>
</html>
