<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Courses – Rudraksha</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="../shared.css">
<style>
.course-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:22px; }
.course-card-top { background:var(--primary-light); padding:18px 20px; }
.course-card-top h3 { font-size:17px; font-weight:600; }
.course-card-body { padding:18px 20px; }
.course-row { display:flex; justify-content:space-between; font-size:14px; margin-bottom:10px; }
.price { color:var(--primary); font-weight:600; }
.btn-group { display:flex; gap:8px; margin-top:12px; }
.btn-group .btn { flex:1; justify-content:center; }
</style>
</head>
<body>

<nav class="topnav">
  <span class="logo-text">RC Rudraksha</span>
  <div class="topnav-right">
    <button class="dark-toggle">🌙</button>
    <button class="hamburger" id="hamburger" aria-label="Open menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<div class="app-shell">
  <aside class="sidebar">
    <div class="logo">RC Rudraksha</div>
    <ul class="menu">
      <li><a href="dashboard.html"><i class="fa-solid fa-chart-line"></i>Dashboard</a></li>
      <li><a href="students.html"><i class="fa-solid fa-user-graduate"></i>Students</a></li>
      <li class="active"><a href="courses.html"><i class="fa-solid fa-book"></i>Courses</a></li>
      <li><a href="packages.html"><i class="fa-solid fa-box"></i>Packages</a></li>
      <li><a href="attendance.html"><i class="fa-solid fa-calendar-check"></i>Attendance</a></li>
      <li><a href="report.html"><i class="fa-solid fa-chart-pie"></i>Reports</a></li>
      <li><a href="setting.html"><i class="fa-solid fa-gear"></i>Settings</a></li>
    </ul>
    <div class="admin-box"><strong>Admin User</strong><br>admin@rudraksha.com</div>
  </aside>

  <main class="main">
    <div class="page-header">
      <div><h2>Courses</h2><p>Manage all courses and training programs</p></div>
      <div class="header-actions">
        <button class="btn btn-primary" onclick="openModal()"><i class="fa-solid fa-plus"></i> Add Course</button>
        <button class="dark-toggle">🌙</button>
      </div>
    </div>

    <div class="search-bar">
      <i class="fa-solid fa-search" style="color:var(--text-muted)"></i>
      <input type="text" id="searchCourses" placeholder="Search courses…" oninput="searchCourses()">
    </div>

    <div class="course-grid" id="courseGrid"></div>
  </main>
</div>

<!-- Course Modal -->
<div class="modal" id="courseModal">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="modalTitle">Add Course</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="form-group"><label>Course Name *</label><input type="text" id="courseName" placeholder="e.g. Web Development"></div>
    <div class="form-group"><label>Description *</label><textarea id="description" rows="3" placeholder="Course description" style="width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:14px;outline:none;resize:vertical;"></textarea></div>
    <div class="form-group"><label>Duration *</label><input type="text" id="duration" placeholder="e.g. 3 Months"></div>
    <div class="form-group"><label>Fees (₹) *</label><input type="number" id="fees" placeholder="0" min="0"></div>
    <div class="form-group"><label>Instructor</label><input type="text" id="instructor" placeholder="Instructor name"></div>
    <div class="form-group"><label>Capacity</label><input type="number" id="capacity" value="50" min="1"></div>
    <button class="btn btn-primary btn-full" onclick="saveCourse()">Save Course</button>
  </div>
</div>

<!-- Content Modal -->
<div class="modal" id="contentModal">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="contentTitle"></h3>
      <button class="modal-close" onclick="closeContentModal()">✕</button>
    </div>
    <p id="contentDescription" style="line-height:1.7;color:var(--text-muted);font-size:14px;margin-bottom:16px;"></p>
    <button class="btn btn-primary btn-full" onclick="closeContentModal()">Close</button>
  </div>
</div>

</body>

<script src="/api.js"></script>
<script src="../shared.js"></script>
<script>
if (!localStorage.getItem("token")) window.location.href = "login.html";

let allCourses = [], courseStudentCount = {};

document.addEventListener("DOMContentLoaded", loadCourses);

async function loadCourses() {
  showSpinner();
  const [cr, sr] = await Promise.all([API.courses.getAll(), API.ownerStudents.getAll()]);
  hideSpinner();
  if (cr.success) allCourses = cr.courses || [];
  if (sr.success) {
    courseStudentCount = {};
    (sr.students || []).forEach(s => {
      if (s.course?._id) courseStudentCount[s.course._id] = (courseStudentCount[s.course._id] || 0) + 1;
    });
  }
  displayCourses(allCourses);
}

function displayCourses(courses) {
  const grid = document.getElementById("courseGrid");
  if (!courses.length) { grid.innerHTML = "<p style='padding:30px;color:var(--text-muted)'>No courses found</p>"; return; }
  grid.innerHTML = courses.map(c => {
    const count = courseStudentCount[c._id] || 0;
    return `
    <div class="card course-card" style="padding:0;overflow:hidden;">
      <div class="course-card-top"><h3>${c.courseName}</h3></div>
      <div class="course-card-body">
        <div class="course-row"><span>${c.duration}</span><span class="price">₹${c.fees}</span></div>
        <div class="course-row">
          <span>${count} Student${count !== 1 ? "s" : ""}</span>
          <span class="badge badge-green">${c.status === "active" ? "Active" : "Inactive"}</span>
        </div>
        <div style="font-size:13px;color:var(--text-muted);margin-bottom:14px;">
          Instructor: <strong>${c.instructor || "Not assigned"}</strong>
        </div>
        <div class="btn-group">
          <button class="btn btn-primary btn-sm" onclick="viewContent('${c._id}')">View</button>
          <button class="btn btn-blue btn-sm" onclick="editCourse('${c._id}')">Edit</button>
          <button class="btn btn-red btn-sm" onclick="deleteCourse('${c._id}')">Delete</button>
        </div>
      </div>
    </div>`;
  }).join("");
}

function searchCourses() {
  const q = document.getElementById("searchCourses").value.toLowerCase();
  displayCourses(allCourses.filter(c => c.courseName.toLowerCase().includes(q)));
}

async function viewContent(id) {
  const r = await API.courses.get(id);
  if (r.success && r.course) {
    document.getElementById("contentTitle").innerText = r.course.courseName;
    document.getElementById("contentDescription").innerText = r.course.description || "No content available";
    document.getElementById("contentModal").classList.add("open");
  }
}

function closeContentModal() { document.getElementById("contentModal").classList.remove("open"); }

async function deleteCourse(id) {
  if (!confirm("Delete this course?")) return;
  const r = await API.courses.delete(id);
  r.success ? (showToast("Course deleted"), loadCourses()) : showToast(r.message, "error");
}

let editingCourseId = null;

function openModal(id = null) {
  editingCourseId = id;
  document.getElementById("modalTitle").textContent = id ? "Update Course" : "Add Course";
  if (!id) clearForm(); else loadCourseForEdit(id);
  document.getElementById("courseModal").classList.add("open");
}

function editCourse(id) { openModal(id); }
function closeModal() { document.getElementById("courseModal").classList.remove("open"); editingCourseId = null; }

function clearForm() {
  ["courseName","description","duration","fees","instructor"].forEach(id => document.getElementById(id).value = "");
  document.getElementById("capacity").value = "50";
}

async function loadCourseForEdit(id) {
  const r = await API.courses.get(id);
  if (r.success && r.course) {
    const c = r.course;
    document.getElementById("courseName").value = c.courseName;
    document.getElementById("description").value = c.description || "";
    document.getElementById("duration").value = c.duration;
    document.getElementById("fees").value = c.fees;
    document.getElementById("instructor").value = c.instructor || "";
    document.getElementById("capacity").value = c.capacity || 50;
  }
}

async function saveCourse() {
  const courseName = document.getElementById("courseName").value.trim();
  const description = document.getElementById("description").value.trim();
  const duration = document.getElementById("duration").value.trim();
  const fees = parseFloat(document.getElementById("fees").value);
  if (!courseName || !description || !duration || !fees) {
    showToast("Please fill all required fields", "error"); return;
  }
  const data = { courseName, description, duration, fees,
    instructor: document.getElementById("instructor").value.trim(),
    capacity: parseInt(document.getElementById("capacity").value) || 50 };
  showSpinner();
  const r = editingCourseId ? await API.courses.update(editingCourseId, data) : await API.courses.add(data);
  hideSpinner();
  r.success ? (showToast(editingCourseId ? "Course updated" : "Course added"), closeModal(), loadCourses())
            : showToast(r.message, "error");
}
</script>
</html>
