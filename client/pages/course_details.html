<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Course Details</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

/* Modern Gradient Background */

body{
display:flex;
min-height:100vh;
background: linear-gradient(135deg,#eef2ff,#e0e7ff,#f0f9ff);
}

/* Sidebar */

.sidebar{
width:240px;
background:linear-gradient(180deg,#ffffff,#f9fbff);
height:100vh;
padding:25px;
box-shadow:0 8px 25px rgba(0,0,0,0.06);
border-right:1px solid #eee;
}

.logo{
font-size:20px;
font-weight:600;
color:#ff7a00;
margin-bottom:40px;
}

.menu{
list-style:none;
}

.menu li{
padding:12px;
border-radius:8px;
margin-bottom:10px;
cursor:pointer;
transition:0.3s;
display:flex;
align-items:center;
gap:10px;
}

.menu li:hover{
background:linear-gradient(90deg,#fff3e6,#ffe7cc);
color:#ff7a00;
transform:translateX(6px);
box-shadow:0 5px 10px rgba(0,0,0,0.05);
}

/* Active Menu */

.menu .active{
background:linear-gradient(90deg,#ff7a00,#ff9a3c);
color:white;
}

/* Main Content */

.main{
flex:1;
padding:40px;
}

/* Course Card */

.course-card{
background:white;
padding:40px;
border-radius:18px;
box-shadow:0 15px 35px rgba(0,0,0,0.08);
max-width:800px;
transition:0.3s;
border:1px solid rgba(0,0,0,0.04);
}

.course-card:hover{
transform:translateY(-6px);
box-shadow:0 20px 40px rgba(0,0,0,0.12);
}

.course-title{
font-size:26px;
margin-bottom:20px;
color:#333;
}

/* Info Grid */

.info-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
margin-bottom:25px;
}

.info-box{
background:linear-gradient(135deg,#f9fbff,#eef2ff);
padding:18px;
border-radius:12px;
border:1px solid #eef2ff;
transition:0.3s;
}

.info-box:hover{
transform:scale(1.03);
}

/* Course Content */

.syllabus{
margin-top:15px;
padding-left:15px;
}

.syllabus li{
margin-bottom:8px;
padding-left:5px;
}

</style>
</head>

<body>

<div class="sidebar">

<div class="logo">RC Rudraksha</div>

<ul class="menu">

<li><i class="fa-solid fa-chart-line"></i> Dashboard</li>

<li><i class="fa-solid fa-user-graduate"></i> Students</li>

<li class="active"><i class="fa-solid fa-book"></i> Courses</li>

<li><i class="fa-solid fa-box"></i> Packages</li>

<li><i class="fa-solid fa-calendar-check"></i> Attendance</li>

</ul>

</div>

<div class="main">

<div class="course-card">

<h2 class="course-title">Basic Computer Course</h2>

<div class="info-grid">

<div class="info-box">
<b>Instructor</b><br>
Mr Verma
</div>

<div class="info-box">
<b>Duration</b><br>
3 Months
</div>

<div class="info-box">
<b>Price</b><br>
₹5000
</div>

<div class="info-box">
<b>Total Students</b><br>
85
</div>

</div>

<h3>Course Content</h3>

<ul class="syllabus">
<li>Introduction to Computer</li>
<li>Windows Basics</li>
<li>MS Word</li>
<li>MS Excel</li>
<li>PowerPoint</li>
<li>Internet & Email</li>
</ul>

</div>

</div>

</body>
</html>
