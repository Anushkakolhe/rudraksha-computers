<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Course Learning – Rudraksha</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="../shared.css">
<style>
.course-info-box { background:var(--surface); padding:20px; border-radius:var(--radius); box-shadow:var(--shadow-sm); margin-bottom:20px; }
.course-info-box h2 { font-size:20px; margin-bottom:6px; }
.course-info-box p { font-size:14px; color:var(--text-muted); margin-bottom:4px; }
</style>
</head>
<body>

<nav class="topnav">
  <span class="logo-text">RC Rudraksha</span>
  <div class="topnav-right">
    <button class="dark-toggle">🌙</button>
    <button class="hamburger" id="hamburger" aria-label="Open menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<div class="app-shell">
  <aside class="sidebar">
    <div class="logo">RC Rudraksha</div>
    <div class="menu">
      <a href="stud_dashboard.html"><i class="fa fa-chart-line"></i>Dashboard</a>
      <a href="stud_my_courses.html" class="active"><i class="fa fa-book"></i>My Courses</a>
      <a href="stud_attendance.html"><i class="fa fa-calendar-check"></i>Attendance</a>
      <a href="stud_profile.html"><i class="fa fa-user"></i>Profile</a>
      <a href="#" onclick="logout()"><i class="fa fa-sign-out"></i>Logout</a>
    </div>
  </aside>

  <main class="main">
    <div class="course-info-box">
      <h2 id="courseName">Loading…</h2>
      <p>Instructor: <span id="instructor">—</span></p>
      <p>Duration: <span id="duration">—</span></p>
      <p>Progress: <span id="progress">0%</span></p>
    </div>

    <div class="card">
      <h3>Course Progress</h3>
      <p id="progressText" style="font-size:14px;color:var(--text-muted);margin-bottom:8px;">0% Completed</p>
      <div class="progress-track"><div class="progress-fill" id="progressBar" style="width:0%"></div></div>
    </div>

    <h3 style="margin-bottom:14px;font-size:16px;">Course Syllabus</h3>
    <div id="contentContainer"></div>

    <div style="margin-top:20px;">
      <button id="certificateBtn" class="btn btn-primary" disabled onclick="downloadCertificate()">
        🎓 Download Certificate
      </button>
    </div>
  </main>
</div>

<script src="../shared.js"></script>
<script>
const urlParams = new URLSearchParams(window.location.search);
const courseId = localStorage.getItem("selectedCourseId") || urlParams.get("id") || "";
console.log("\n=== CONTINUE LEARNING PAGE LOADED ===");
console.log("URL Search Params:", window.location.search);
console.log("localStorage courseId:", localStorage.getItem("selectedCourseId"));
console.log("Extracted courseId:", courseId);
console.log("courseId type:", typeof courseId);
console.log("courseId length:", courseId.length);
console.log("courseId trimmed:", courseId.trim());

const token = localStorage.getItem("token");
const contentContainer = document.getElementById("contentContainer");
const progressBar = document.getElementById("progressBar");
const progressText = document.getElementById("progressText");
const courseNameEl = document.getElementById("courseName");
const durationEl = document.getElementById("duration");
const progressEl = document.getElementById("progress");
const certificateBtn = document.getElementById("certificateBtn");

let totalLessons = 0;
let completedIndexes = new Set();
let isUsingFallback = false;

const loadSavedProgress = () => {
  if (!courseId) return null;
  const saved = localStorage.getItem("progress_" + courseId);
  return saved !== null ? Number(saved) : null;
};

const loadSavedCompletedIds = () => {
  if (!courseId) return [];
  try {
    const saved = JSON.parse(localStorage.getItem("completedIndexes_" + courseId) || "[]");
    return Array.isArray(saved) ? saved : [];
  } catch (error) {
    return [];
  }
};

const saveProgressState = (percent) => {
  localStorage.setItem("progress_" + courseId, String(percent));
  localStorage.setItem("completedIndexes_" + courseId, JSON.stringify([...completedIndexes]));
};

const updateProgressDisplay = (percent) => {
  const normalized = Math.min(Math.max(Math.round(percent), 0), 100);
  progressBar.style.width = normalized + "%";
  progressText.innerText = normalized + "% Completed";
  progressEl.innerText = normalized + "%";
  certificateBtn.disabled = normalized !== 100;
};

const getContentItems = (data) => {
  if (Array.isArray(data.content) && data.content.length > 0) {
    return data.content.map((item) => {
      if (item && typeof item === "object") {
        return {
          text: String(item.text || item.description || item.title || item.videoUrl || "").trim(),
          notesFile: String(item.notesFile || "").trim()
        };
      }
      return {
        text: String(item || "").trim(),
        notesFile: ""
      };
    }).filter((item) => item.text.length > 0);
  }

  if (typeof data.description === "string" && data.description.trim()) {
    return data.description
      .split(/\r?\n/)
      .map((line) => ({ text: line.trim(), notesFile: "" }))
      .filter((item) => item.text.length > 0);
  }

  if (typeof data.content === "string" && data.content.trim()) {
    return data.content
      .split(/\r?\n/)
      .map((line) => ({ text: line.trim(), notesFile: "" }))
      .filter((item) => item.text.length > 0);
  }

  return [];
};

const getFallbackContentItems = (course) => {
  let fallbackItems = [];

  if (typeof course.description === "string") {
    fallbackItems = course.description
      .split(/\n/)
      .map(line => line.replace(/^\d+\.\s*/, '').trim())
      .filter(item => item.length > 0)
      .map(item => ({
        description: item,
        notesFile: null,
        _id: "fallback_" + Math.random().toString(36).substr(2, 9)
      }));
  }

  return fallbackItems;
};

const setCardCompleteState = (id, completed) => {
  const card = document.getElementById("content-card-" + id);
  if (!card) return;
  card.classList.toggle("completed", completed);
  const completeBtn = card.querySelector("button.complete-btn");
  if (completeBtn) {
    completeBtn.disabled = completed;
  }
};

const updateProgressState = () => {
  const percent = totalLessons > 0
    ? Math.min(Math.round((completedIndexes.size / totalLessons) * 100), 100)
    : 0;

  updateProgressDisplay(percent);
  saveProgressState(percent);
};

const downloadNotes = (url) => {
  console.log("Download URL:", url);

  if (!url || url === "null" || url.trim() === "") {
    alert("No notes available");
    return;
  }

  // Fix legacy Cloudinary URLs: PDFs stored under /image/upload/ won't open correctly.
  // Force /raw/upload/ for non-image files so the browser handles them properly.
  const imageExts = /\.(jpg|jpeg|png|gif|webp)(\?|$)/i;
  const fixedUrl = !imageExts.test(url)
    ? url.replace("/image/upload/", "/raw/upload/")
    : url;

  window.open(fixedUrl, "_blank");
};

const markComplete = (contentId, isFallback = false) => {
  if (completedIndexes.has(contentId) || totalLessons === 0) return;
  completedIndexes.add(contentId);
  setCardCompleteState(contentId, true);
  updateProgressState();
  
  // Dispatch event for other pages to listen
  window.dispatchEvent(new Event("progressUpdated"));
};

const downloadCertificate = () => {
  const blob = new Blob([
    "Congratulations! You completed the course."
  ], { type: "text/plain" });

  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "certificate.txt";
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
};

function renderCourse(course) {
  console.log("Course received:", course);
  console.log("Content length:", Array.isArray(course.content) ? course.content.length : 0);

  contentContainer.innerHTML = "";
  totalLessons = 0;
  completedIndexes = new Set(loadSavedCompletedIds());
  isUsingFallback = false;

  const progress = Math.min(Math.max(loadSavedProgress() ?? Math.min(Number(course.progress) || 0, 100), 0), 100);

  courseNameEl.innerText = course.courseName || course.name || "Course";
  document.getElementById("instructor").innerText = course.instructor || "Not Available";
  durationEl.innerText = course.duration || "Not Available";
  progressEl.innerText = progress + "%";
  progressBar.style.width = progress + "%";
  progressText.innerText = progress + "% Completed";
  certificateBtn.disabled = progress !== 100;

  const contentItems = Array.isArray(course.content) ? course.content : [];
  const fallbackItems = (contentItems.length === 0) ? getFallbackContentItems(course) : [];

  if (contentItems.length === 0 && fallbackItems.length > 0) {
    console.log("Using fallback content with full UI");
    isUsingFallback = true;
    totalLessons = fallbackItems.length;

    fallbackItems.forEach((item) => {
      const card = document.createElement("div");
      card.className = "content-card";
      card.id = "content-card-" + item._id;

      card.innerHTML = `
        <div class="left">
          <span>${item.description}</span>
        </div>
        <div class="right">
          ${item.notesFile ? `<button type="button" class="notes-btn" onclick="downloadNotes('${item.notesFile.replace(/'/g, "\\'")}')">Download Notes</button>` : ""}
          <button type="button" class="complete-btn" id="complete-btn-${item._id}">${completedIndexes.has(item._id) ? "Completed" : "Mark Complete"}</button>
        </div>
      `;

      if (completedIndexes.has(item._id)) {
        card.classList.add("completed");
      }

      contentContainer.appendChild(card);

      const completeBtn = card.querySelector(`#complete-btn-${item._id}`);
      if (completeBtn && !completedIndexes.has(item._id)) {
        completeBtn.addEventListener("click", () => markComplete(item._id));
      }
    });

    updateProgressState();
    return;
  }

  totalLessons = contentItems.length;

  if (totalLessons === 0) {
    contentContainer.innerHTML = "<p>No Content Available</p>";
    return;
  }

  contentItems.forEach((item, index) => {
    const description = item?.description || item?.title || item?.text || "";
    const notesFile = item?.notesFile || "";
    const itemId = String(index);

    const card = document.createElement("div");
    card.className = "content-card";
    card.id = "content-card-" + itemId;

    card.innerHTML = `
      <div class="left">
        <span>${description}</span>
      </div>
      <div class="right">
        ${notesFile ? `<button type="button" class="notes-btn" onclick="downloadNotes('${notesFile.replace(/'/g, "\\'")}')">Download Notes</button>` : ""}
        <button type="button" class="complete-btn" id="complete-btn-${itemId}">${completedIndexes.has(itemId) ? "Completed" : "Mark Complete"}</button>
      </div>
    `;

    if (completedIndexes.has(itemId)) {
      card.classList.add("completed");
    }

    contentContainer.appendChild(card);

    const completeBtn = card.querySelector(`#complete-btn-${itemId}`);
    if (completeBtn && !completedIndexes.has(itemId)) {
      completeBtn.addEventListener("click", () => markComplete(itemId));
    }
  });

  if (completedIndexes.size > 0) {
    updateProgressState();
  } else {
    updateProgressDisplay(progress);
  }
}

async function loadCourse() {
  console.log("\n[loadCourse] CALLED");
  console.log("[loadCourse] courseId:", courseId);
  console.log("[loadCourse] token exists:", !!token);
  
  if (!courseId || !token) {
    console.error("[loadCourse] Missing courseId or token!");
    console.error("[loadCourse] courseId:", courseId);
    console.error("[loadCourse] token exists:", !!token);
    contentContainer.innerHTML = "<p>Please open this page from My Courses.</p>";
    return;
  }

  try {
    const apiUrl = `https://rudraksha-computers.onrender.com/api/student/course/id/${encodeURIComponent(courseId)}`;
    console.log("[loadCourse] Fetching from:", apiUrl);
    console.log("[loadCourse] Full URL including params:", window.location.href);
    
    const res = await fetch(apiUrl, {
      headers: {
        Authorization: "Bearer " + token
      }
    });
    
    console.log("[loadCourse] Response status:", res.status);
    console.log("[loadCourse] Response ok:", res.ok);
    
    const data = await res.json();
    console.log("[loadCourse] API RESPONSE DATA:", data);
    
    if (res.status !== 200) {
      console.error("[loadCourse] API error:", data.message);
      contentContainer.innerHTML = `<p>${data.message || "Unable to load course content."}</p>`;
      return;
    }
    
    console.log("[loadCourse] Successfully loaded course:", data.courseName || data.name);
    renderCourse(data);
  } catch (err) {
    console.error("[loadCourse] Error:", err);
    console.error("[loadCourse] Stack:", err.stack);
    contentContainer.innerHTML = "<p>Unable to load course content.</p>";
  }
}

window.onload = () => {
  loadCourse();
};

</script>

</body>
</html>
