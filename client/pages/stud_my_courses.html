<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Courses – Rudraksha</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="../shared.css">
</head>
<body>

<nav class="topnav">
  <span class="logo-text">RC Rudraksha</span>
  <div class="topnav-right">
    <button class="dark-toggle">🌙</button>
    <button class="hamburger" id="hamburger" aria-label="Open menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<div class="app-shell">
  <aside class="sidebar">
    <div class="logo">RC Rudraksha</div>
    <div class="menu">
      <a href="stud_dashboard.html"><i class="fa fa-chart-line"></i>Dashboard</a>
      <a href="stud_my_courses.html" class="active"><i class="fa fa-book"></i>My Courses</a>
      <a href="stud_attendance.html"><i class="fa fa-calendar-check"></i>Attendance</a>
      <a href="stud_progres.html"><i class="fa fa-chart-bar"></i>Progress</a>
      <a href="stud_assignment.html"><i class="fa fa-file"></i>Assignments</a>
      <a href="stud_profile.html"><i class="fa fa-user"></i>Profile</a>
      <a href="#" onclick="logout()"><i class="fa fa-sign-out"></i>Logout</a>
    </div>
  </aside>

  <main class="main">
    <div class="page-header">
      <div><h2>My Courses</h2><p>Continue learning your enrolled courses</p></div>
      <button class="dark-toggle">🌙</button>
    </div>
    <div class="course-grid" id="courseGrid">
      <p style="color:var(--text-muted)">Loading courses…</p>
    </div>
  </main>
</div>

<script src="../shared.js"></script>
<script>
async function loadCourses() {
  const token = localStorage.getItem("token");
  if (!token) { window.location.href = "stud_login.html"; return; }

  showSpinner();
  try {
    const res = await fetch("https://rudraksha-computers.onrender.com/api/student/dashboard", {
      headers: { "Authorization": "Bearer " + token }
    });
    const data = await res.json();
    const grid = document.getElementById("courseGrid");
    const courses = data.courses || data.enrolledCourses || [];

    if (!courses.length) { grid.innerHTML = "<p style='color:var(--text-muted)'>No courses enrolled</p>"; return; }

    grid.innerHTML = courses.map((course, idx) => {
      const courseId = course.courseId || course._id || "";
      const name = course.name || course.courseName || "Unknown Course";
      const savedProgress = courseId ? localStorage.getItem("progress_" + courseId) : null;
      const progress = savedProgress !== null ? Math.min(Number(savedProgress), 100) : Math.min(Number(course.progress) || 0, 100);
      const duration = course.duration || "Not Available";
      const fees = course.feesPaid || course.fees || 0;
      return `
      <div class="course-card">
        <div class="course-card-top"><h3>${name}</h3></div>
        <div class="course-card-body">
          <div class="course-meta"><span><i class="fa fa-clock" style="margin-right:4px;"></i>${duration}</span><span>₹${fees} paid</span></div>
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:8px;">
            <span style="color:var(--text-muted)">Progress</span><span style="font-weight:600;">${progress}%</span>
          </div>
          <div class="progress-track" style="margin-bottom:14px;"><div class="progress-fill" style="width:${progress}%"></div></div>
          <button class="btn btn-primary btn-full" onclick="continueLearning('${courseId.replace(/'/g,"\\'")}')">
            <i class="fa fa-play" style="margin-right:6px;"></i>Continue Learning
          </button>
        </div>
      </div>`;
    }).join("");
  } catch (err) {
    document.getElementById("courseGrid").innerHTML = "<p style='color:var(--red)'>Unable to load courses</p>";
  } finally {
    hideSpinner();
  }
}

function continueLearning(courseId) {
  localStorage.setItem("selectedCourseId", courseId);
  window.location.href = "stud_continue_learning.html";
}

window.addEventListener("progressUpdated", () => location.reload());
loadCourses();
</script>
</body>
</html>
