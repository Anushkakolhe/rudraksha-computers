
<!DOCTYPE html>
<html>
<head>
<title>Attendance - Rudraksha</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

/* Page Background */

body{
display:flex;
background:linear-gradient(135deg,#eef2ff,#e0e7ff,#f5f7ff);
min-height:100vh;
}

/* Sidebar */

.sidebar{
width:230px;
background:white;
height:100vh;
padding:25px;
box-shadow:2px 0 15px rgba(0,0,0,.08);
}

.logo{
font-weight:600;
font-size:18px;
margin-bottom:30px;
color:#ff7a00;
}

.menu a{
display:flex;
align-items:center;
gap:10px;
padding:12px;
margin-bottom:8px;
text-decoration:none;
color:#333;
border-radius:8px;
transition:.3s;
}

.menu a:hover{
background:#fff3e6;
color:#ff7a00;
transform:translateX(5px);
}

.menu a.active{
background:linear-gradient(90deg,#ff7a00,#ff9a3c);
color:white;
}

/* Main */

.main{
flex:1;
padding:35px;
}

/* Heading */

.main h1{
margin-bottom:5px;
}

.main p{
color:#666;
margin-bottom:25px;
}

/* Stats Cards */

.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:30px;
}

.stat-box{
background:white;
padding:20px;
border-radius:14px;
box-shadow:0 8px 20px rgba(0,0,0,.08);
transition:.3s;
}

.stat-box:hover{
transform:translateY(-5px);
}

.stat-box h4{
font-size:14px;
color:#666;
margin-bottom:8px;
}

.stat-box h2{
font-size:26px;
}

/* Card */

.card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.card h3{
margin-bottom:15px;
}

/* Table */

table{
width:100%;
border-collapse:collapse;
}

th{
text-align:left;
padding:12px;
background:#f7f9fc;
font-size:14px;
}

td{
padding:12px;
border-bottom:1px solid #eee;
}

tr{
transition:.3s;
}

tr:hover{
background:#f9fbff;
}

/* Status Styles */

.status-present{
background:#e8f8ee;
color:#27ae60;
padding:5px 10px;
border-radius:20px;
font-size:12px;
font-weight:500;
}

.status-absent{
background:#fdecea;
color:#e74c3c;
padding:5px 10px;
border-radius:20px;
font-size:12px;
font-weight:500;
}

.status-late{
background:#fff4e5;
color:#f39c12;
padding:5px 10px;
border-radius:20px;
font-size:12px;
font-weight:500;
}

</style>
</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<div class="logo">RC Rudraksha</div>

<div class="menu">
<a href="dashboard.html"><i class="fa fa-chart-line"></i> Dashboard</a>
<a href="students.html"><i class="fa fa-user-graduate"></i> Students</a>
<a href="courses.html"><i class="fa fa-book"></i> Courses</a>
<a href="packages.html"><i class="fa fa-box"></i> Packages</a>
<a href="attendance.html" class="active"><i class="fa fa-calendar-check"></i> Attendance</a>
<a href="report.html"><i class="fa-solid fa-chart-pie"></i> Reports</a>
<a href="setting.html"><i class="fa fa-gear"></i> Settings</a>
</div>

</div>

<!-- Main Content -->

<div class="main">

<h1>Attendance</h1>
<p>Track and manage student attendance</p>

<!-- Stats -->

<div class="stats">

<div class="stat-box">
<h4>Today's Total</h4>
<h2 id="totalAttendance">0</h2>
</div>

<div class="stat-box">
<h4>Present</h4>
<h2 style="color:#27ae60;" id="presentCount">0</h2>
</div>

<div class="stat-box">
<h4>Absent</h4>
<h2 style="color:#e74c3c;" id="absentCount">0</h2>
</div>

<div class="stat-box">
<h4>Late</h4>
<h2 style="color:#f39c12;" id="lateCount">0</h2>
</div>

</div>

<!-- Table -->

<div class="card">

<div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; margin-bottom:16px;">
  <div style="display:flex; align-items:center; gap:12px;">
    <label for="attendanceDate" style="font-weight:600;">Select Date</label>
    <input type="date" id="attendanceDate" />
  </div>
  <button class="create-btn" onclick="saveAttendance()">Save Attendance</button>
</div>

<h3 id="attendanceHeading">Attendance</h3>

<table>
<thead>
<tr>
<th>Name</th>
<th>Course</th>
<th>Enrollment</th>
<th>End Date</th>
<th>Status</th>
</tr>
</thead>
<tbody id="attendanceTable">
</tbody>
</table>

</div>

</div>

</body>

<script src="../api.js"></script>

<script>

if(!localStorage.getItem("token")){
  window.location.href="login.html";
}

const attendanceDateInput = document.getElementById("attendanceDate");
const attendanceHeading = document.getElementById("attendanceHeading");

function formatDate(date){
  const d = new Date(date);
  const month = `${d.getMonth()+1}`.padStart(2, '0');
  const day = `${d.getDate()}`.padStart(2, '0');
  return `${d.getFullYear()}-${month}-${day}`;
}

function formatDisplayDate(date){
  const d = new Date(date);
  const month = `${d.getMonth()+1}`.padStart(2, '0');
  const day = `${d.getDate()}`.padStart(2, '0');
  return `${day}-${month}-${d.getFullYear()}`;
}

function normalizeDate(date){
  const d = new Date(date);
  d.setHours(0,0,0,0);
  d.setMilliseconds(0);
  return d;
}

async function initAttendance(){
  const today = new Date();
  attendanceDateInput.value = formatDate(today);
  attendanceDateInput.addEventListener('change', loadAttendance);
  await loadAttendance();
}

document.addEventListener("DOMContentLoaded", initAttendance);

async function loadAttendance(){
  const selectedDate = attendanceDateInput.value || formatDate(new Date());
  const attendanceResult = await API.attendance.getByDate(selectedDate);
  console.log('Load attendance for date', selectedDate, attendanceResult);

  if(attendanceResult.success && attendanceResult.students){
    displayAttendance(attendanceResult.students, selectedDate);
    displayStats(attendanceResult.students, selectedDate);
    attendanceHeading.innerText = `Attendance for ${formatDisplayDate(selectedDate)}`;
  } else {
    document.getElementById("attendanceTable").innerHTML = "<tr><td colspan='5' style='text-align:center;padding:20px;'>Unable to load attendance records.</td></tr>";
    displayStats([], selectedDate);
  }
}

function displayAttendance(students, selectedDate){
  const tableBody = document.getElementById("attendanceTable");
  tableBody.innerHTML = "";
  const selected = normalizeDate(selectedDate);

  if(students.length === 0){
    tableBody.innerHTML = "<tr><td colspan='5' style='text-align:center;padding:20px;'>No students found</td></tr>";
    return;
  }

  students.forEach(student => {
    const enrollmentDate = student.enrollmentDate ? normalizeDate(student.enrollmentDate) : null;
    const endDate = student.endDate ? normalizeDate(student.endDate) : null;
    const invalid = !enrollmentDate || !endDate || selected < enrollmentDate || selected > endDate;
    const status = invalid ? 'Absent' : (student.status || 'Absent');
    const disabled = invalid ? 'disabled' : '';
    const courseName = student.course?.courseName || 'N/A';

    const row = `
      <tr data-student-id="${student.studentId}">
        <td>${student.name || 'Unknown'}</td>
        <td>${courseName}</td>
        <td>${enrollmentDate ? formatDisplayDate(enrollmentDate) : 'N/A'}</td>
        <td>${endDate ? formatDisplayDate(endDate) : 'N/A'}</td>
        <td>
          <select class="attendance-select" ${disabled}>
            <option value="Present" ${status === 'Present' ? 'selected' : ''}>Present</option>
            <option value="Absent" ${status === 'Absent' ? 'selected' : ''}>Absent</option>
          </select>
          ${invalid ? '<div style="font-size:12px;color:#e74c3c;margin-top:4px;">Outside enrollment period</div>' : ''}
        </td>
      </tr>
    `;

    tableBody.innerHTML += row;
  });
}

function displayStats(students){
  const validStudents = students.filter(student => {
    const selected = normalizeDate(attendanceDateInput.value);
    const enrollmentDate = student.enrollmentDate ? normalizeDate(student.enrollmentDate) : null;
    const endDate = student.endDate ? normalizeDate(student.endDate) : null;
    return enrollmentDate && endDate && selected >= enrollmentDate && selected <= endDate;
  });

  const present = validStudents.filter(student => student.status === 'Present').length;
  const absent = validStudents.filter(student => student.status === 'Absent').length;
  const total = validStudents.length;

  document.getElementById("totalAttendance").innerText = total;
  document.getElementById("presentCount").innerText = present;
  document.getElementById("absentCount").innerText = absent;
  document.getElementById("lateCount").innerText = 0;
}

async function saveAttendance(){
  const selectedDate = attendanceDateInput.value;
  if(!selectedDate){
    alert('Please select a date.');
    return;
  }

  const rows = document.querySelectorAll('#attendanceTable tr');
  const promises = [];

  rows.forEach(row => {
    const select = row.querySelector('select.attendance-select');
    if(!select || select.disabled) return;

    const studentId = row.dataset.studentId;
    const status = select.value;
    console.log('Saving attendance', { studentId, selectedDate, status });

    promises.push(API.attendance.mark({ studentId, date: selectedDate, status }));
  });

  if(promises.length === 0){
    alert('No valid students to mark attendance.');
    return;
  }

  const results = await Promise.all(promises);
  const failed = results.filter(result => !result.success);

  if(failed.length === 0){
    alert('Attendance saved successfully.');
  } else {
    console.error('Attendance save errors', failed);
    alert(`Attendance saved with ${failed.length} failures.`);
  }

  await loadAttendance();
}

</script>

</html>
