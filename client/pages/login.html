<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Owner Login – Rudraksha</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="../shared.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-left">
      <h2>Owner Dashboard</h2>
      <p>Login to manage students, courses, attendance, reports and institute data.</p>
    </div>
    <div class="login-right">
      <div id="login" class="login-form">
        <h2>Owner Login</h2>
        <div class="input-box"><i class="fa fa-envelope"></i><input type="email" id="email" placeholder="Owner Email" required></div>
        <div class="input-box"><i class="fa fa-lock"></i><input type="password" id="password" placeholder="Password" minlength="8" maxlength="16" required></div>
        <button class="login-btn" onclick="handleLogin(event)">Login</button>
        <div class="toggle-link">Don't have an account? <span onclick="showSignup()">Sign Up</span></div>
      </div>
      <div id="signup" class="login-form" style="display:none;">
        <h2>Create Account</h2>
        <div class="input-box"><i class="fa fa-user"></i><input type="text" id="name" placeholder="Full Name" required></div>
        <div class="input-box"><i class="fa fa-envelope"></i><input type="email" id="signup-email" placeholder="Owner Email" required></div>
        <div class="input-box"><i class="fa fa-lock"></i><input type="password" id="signup-password" placeholder="Password" minlength="8" maxlength="16" required></div>
        <button class="login-btn" onclick="handleSignup(event)">Create Account</button>
        <div class="toggle-link">Already have an account? <span onclick="showLogin()">Login</span></div>
      </div>
    </div>
  </div>
</div>

<script src="../shared.js"></script>
<script>
const API_URL = "https://rudraksha-computers.onrender.com/auth";

function showSignup() { document.getElementById("login").style.display="none"; document.getElementById("signup").style.display="flex"; }
function showLogin()  { document.getElementById("signup").style.display="none"; document.getElementById("login").style.display="flex"; }

async function handleLogin(e) {
  e.preventDefault();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  if (!email || !password) { showToast("Please fill in all fields", "error"); return; }
  try {
    const res = await fetch(`${API_URL}/login`, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({email,password}) });
    const data = await res.json();
    if (data.success) {
      localStorage.setItem("token", data.token);
      localStorage.setItem("user", JSON.stringify(data.user));
      window.location.href = "dashboard.html";
    } else { showToast(data.message, "error"); }
  } catch { showToast("An error occurred. Please try again.", "error"); }
}

async function handleSignup(e) {
  e.preventDefault();
  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("signup-email").value.trim();
  const password = document.getElementById("signup-password").value;
  if (!name || !email || !password) { showToast("Please fill in all fields", "error"); return; }
  try {
    const res = await fetch(`${API_URL}/signup`, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({name,email,password}) });
    const data = await res.json();
    if (data.success) { showToast("Account created! Please login."); showLogin(); }
    else { showToast(data.message, "error"); }
  } catch { showToast("An error occurred. Please try again.", "error"); }
}
</script>
</body>
</html>
